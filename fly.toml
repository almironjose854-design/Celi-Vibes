# Cambia este nombre por uno unico antes del primer deploy.
app = "celi-vibes-change-me"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  max_per_region = 1
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[mounts]]
  source = "celi_vibes_data"
  destination = "/data"
  initial_size = "3gb"
  snapshot_retention = 14
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1gb"
  auto_extend_size_limit = "10gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
