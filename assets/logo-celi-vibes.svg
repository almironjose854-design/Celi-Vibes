      <stop offset="0%" stop-color="#f3ddbd" />
      <stop offset="50%" stop-color="#d7ab75" />
      <stop offset="100%" stop-color="#b7864f" />
    </linearGradient>
    <radialGradient id="flowerCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd167" />
      <stop offset="100%" stop-color="#cf9824" />
    </radialGradient>
  </defs>

  <g transform="translate(32 20)">
